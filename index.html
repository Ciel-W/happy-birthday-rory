<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rory's Private Folder</title>
    <link href="https://fonts.googleapis.com/css2?family=Handjet:wght@100..900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Handjet', cursive; box-sizing: border-box; user-select: none; }
        body, html { margin: 0; padding: 0; height: 100%; background-color: #0044ff; overflow: hidden; }
        .hidden { display: none !important; }
        .btn { padding: 8px 35px; font-size: 1.8rem; cursor: pointer; border: 3px solid #000; background: #fff; border-radius: 4px; box-shadow: 6px 6px 0px #000; }
        .btn:active { box-shadow: 0px 0px 0px #000; transform: translate(6px, 6px); }

        /* --- STAGES --- */
        #homepage { display: flex; justify-content: center; align-items: center; height: 100vh; cursor: pointer; }
        .oval-bg { width: 95vw; height: 85vh; background: radial-gradient(ellipse, #66ff99 0%, #0044ff 75%); border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative;}
        #horse { width: 260px; z-index: 10; transition: transform 2.5s ease-in-out; margin-bottom: 40px; }
        
        #desktop { height: 100vh; background-color: #6ed3c0; position: relative; display: flex; flex-direction: column; }
        .icon { position: absolute; display: flex; flex-direction: column; align-items: center; cursor: pointer; width: 130px; text-align: center; }
        .icon img { width: 100px; height: 100px; }
        .icon span { font-size: 1.4rem; color: #fff; text-shadow: 1px 1px 3px rgba(0,0,0,0.3); }

        .taskbar { height: 60px; background-color: #d8d8d8; border-top: 2px solid #999; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 100; }
        
        #app-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; display: flex; justify-content: center; align-items: center; }
        #app-window { width: 80%; height: 80%; background: #fff; border: 3px solid #000; box-shadow: 10px 10px 0px #000; display: flex; flex-direction: column; }
        .window-chrome { background: #000; color: #fff; padding: 5px 15px; display: flex; justify-content: space-between; align-items: center; }
        #app-body { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }

        /* --- CAKE GAME --- */
        .cake-wrapper { position: relative; display: flex; justify-content: center; align-items: flex-end; min-height: 300px; margin: 10px 0; width: 100%; }
        .flame { position: absolute; transform: translateX(-50%); animation: flicker 0.2s infinite; color: orange; z-index: 5; pointer-events: none; }
        @keyframes flicker { 0%, 100% { transform: translateX(-50%) skewX(5deg); opacity: 0.8; } 50% { transform: translateX(-50%) skewX(-5deg); opacity: 1; } }
        .game-emoji { font-size: 8rem; cursor: pointer; margin: 20px 0; transition: transform 0.2s; }
        .game-emoji:hover { transform: scale(1.1); }
        .game-text { font-size: 2.5rem; margin: 10px 0; color: #000; }
    </style>
</head>
<body onclick="handleGlobalClick()">

    <div id="homepage">
        <div class="oval-bg">
            <img src="images/horse.gif" id="horse">
            <div id="text-container" class="text-container" style="height:60px; display:flex; align-items:center; margin-bottom:50px; font-size:2.2rem;"></div>
            <div id="button-group" class="button-group hidden" style="position:absolute; bottom:15%; display:flex; gap:25px;">
                <button class="btn" onclick="event.stopPropagation(); enterFolder()">Enter Folder</button>
                <button class="btn" onclick="event.stopPropagation(); runAway()">Come back next year</button>
            </div>
        </div>
    </div>

    <div id="desktop" class="hidden">
        <div id="icon-container" style="flex-grow:1; position:relative; overflow:hidden;">
            <div class="icon" onclick="openApp('car')"><img src="images/car.png"><span>Drive with bean</span></div>
            <div class="icon" onclick="openApp('heaven')"><img src="images/woods.png"><span>Heaven</span></div>
            <div class="icon" onclick="openApp('gallery')"><img src="images/gallery.png"><span>Gallery</span></div>
            <div class="icon" onclick="openApp('cake')"><img src="images/cake.png"><span>Eat a cake!</span></div>
            <div class="icon" onclick="openApp('note')"><img src="images/anim.png"><span>Note</span></div>
        </div>
        <div class="taskbar">
            <button class="exit-btn" onclick="location.reload()" style="font-size:2rem; color:#ff3b30; background:#fff; border:2px solid #000; padding:0 15px; cursor:pointer;">X</button>
            <div style="font-size:1.8rem;">ʕ•ᴥ•ʔ</div>
        </div>
    </div>

    <div id="app-overlay" class="hidden">
        <div id="app-window">
            <div class="window-chrome"><span id="app-title"></span><button onclick="closeApp()" style="cursor:pointer; background:#fff; border: 1px solid black; padding: 2px 8px;">X</button></div>
            <div id="app-body"></div>
        </div>
    </div>

    <script>
        let currentStep = 0, chosenFlavor = "";
        const messages = ["Hi, Rory!", "Happy Horse Rory!", "Would you like to open your private gift folder?"];

        function handleGlobalClick() {
            if (currentStep < messages.length) {
                document.getElementById('text-container').innerHTML = `<p>${messages[currentStep]}</p>`;
                if (++currentStep === 3) document.getElementById('button-group').classList.remove('hidden');
            }
        }

        function runAway() {
            document.getElementById('horse').style.transform = "translateX(-150vw)";
            setTimeout(() => { alert("See you next year!"); location.reload(); }, 2000);
        }

        function randomizeIcons() {
    const icons = document.querySelectorAll('.icon');
    const container = document.getElementById('icon-container');
    const rect = container.getBoundingClientRect();
    
    // Define slot size based on icon dimensions (width 130px, height ~130px)
    const slotW = 150; 
    const slotH = 150;
    
    const cols = Math.floor(rect.width / slotW);
    const rows = Math.floor(rect.height / slotH);
    
    // Create a list of all available slot indices
    let slots = [];
    for (let i = 0; i < cols * rows; i++) {
        slots.push(i);
    }

    icons.forEach(icon => {
        if (slots.length === 0) return; // Safety check
        
        // Pick a random slot and remove it from the list so no two icons share it
        const randomIndex = Math.floor(Math.random() * slots.length);
        const slot = slots.splice(randomIndex, 1)[0];
        
        const col = slot % cols;
        const row = Math.floor(slot / cols);
        
        // Add a tiny bit of "jitter" within the slot so it doesn't look like a perfect grid
        const jitterX = Math.random() * 20;
        const jitterY = Math.random() * 20;

        icon.style.left = (col * slotW + jitterX) + "px";
        icon.style.top = (row * slotH + jitterY) + "px";
    });
}

        function enterFolder() {
            document.getElementById('homepage').classList.add('hidden');
            document.getElementById('desktop').classList.remove('hidden');
            document.body.onclick = null;
            randomizeIcons();
        }

        function openApp(app) {
    const win = document.getElementById('app-window');
    const body = document.getElementById('app-body');
    document.getElementById('app-overlay').classList.remove('hidden');
    
    // Default reset for every app
    win.style.backgroundColor = "#ffffff";
    body.style.padding = "20px"; 
    body.innerHTML = "";

    if (app === 'cake') {
        win.style.backgroundColor = "#FFE876";
        document.getElementById('app-title').innerText = "The Bakery";
        showCakeStep(1);
    } else if (app === 'car') {
        win.style.backgroundColor = "#000"; // Cinematic black
        document.getElementById('app-title').innerText = "Drive with Bean";
        body.style.padding = "0"; // Full-bleed video
        body.innerHTML = `
            <div id="video-ui" style="padding: 20px;">
                <h3 class="game-text" style="color: white;">Are you ready to drive with Bean?</h3>
                <button class="btn" onclick="playBeanVideo()">I'm ready, let's go!</button>
            </div>
            <video id="beanVideo" class="hidden" style="width:100%; height:100%; object-fit: cover; display: block;">
                <source src="videos/bean-drive.mp4" type="video/mp4">
            </video>`;
    } else if (app === 'gallery') {
        document.getElementById('app-title').innerText = "Art Gallery";
        // Show your new loading image and text
        body.innerHTML = `
            <img src="images/gallery-loading.png" style="max-width: 90%; height: auto; border: 4px solid #000;">
            <h3 class="game-text" style="margin-top: 20px;">New exhibition coming soon</h3>
        `;
    } else {
        document.getElementById('app-title').innerText = app.toUpperCase();
        body.innerHTML = `<h3>${app} is loading...</h3>`;
    }
}

        function playBeanVideo() {
            const video = document.getElementById('beanVideo');
            const ui = document.getElementById('video-ui');
            ui.classList.add('hidden');
            video.classList.remove('hidden');
            video.play();
            video.onended = () => closeApp();
        }
        
        function closeApp() { document.getElementById('app-overlay').classList.add('hidden'); }

        function showCakeStep(step) {
            const body = document.getElementById('app-body');
            let content = "";
            switch(step) {
                case 1: content = `<h3 class="game-text">Let's start!</h3><div class="game-emoji" onclick="showCakeStep(2)">🥣</div><p class="game-text">Tap the bowl to add flavor!</p>`; break;
                case 2: content = `<h3 class="game-text">Pick a flavor</h3><div style="display:flex;gap:25px;margin:30px 0;"><button class="btn" onclick="chosenFlavor='choc';showCakeStep(3)">Chocolate</button><button class="btn" onclick="chosenFlavor='hon';showCakeStep(3)">Honey</button></div><div class="cake-wrapper"><img src="images/p-cake.png" width="280" style="opacity:0.5;"></div>`; break;
                case 3: content = `<h3 class="game-text">Put a candle!</h3><div class="cake-wrapper" style="cursor:pointer;" onclick="showCakeStep(4)"><img src="images/${chosenFlavor==='choc'?'chocake.png':'honcake.png'}" width="280"></div><p class="game-text">Tap the cake to add the candle</p>`; break;
                case 4: content = `<h3 class="game-text">Light the candle!</h3><div class="cake-wrapper" style="cursor:pointer;" onclick="showCakeStep(5)"><div class="flame" style="font-size:4rem;bottom:200px;left:45%;">🔥</div><img src="images/${chosenFlavor==='choc'?'chocake-candle.png':'honcake-candle.png'}" width="280"></div><p class="game-text">Click 🔥 to make a wish!</p>`; break;
                case 5: content = `<h3 class="game-text">Make a wish...</h3><div class="cake-wrapper"><div class="flame" style="font-size:4rem;bottom:152px;left:50%;">🔥</div><img src="images/${chosenFlavor==='choc'?'chocake-candle.png':'honcake-candle.png'}" width="200"></div><input type="text" id="wishInput" placeholder="I wish for..." style="font-family:'Handjet';font-size:2.2rem;width:90%;padding:15px;border:4px solid black;"><button class="btn" style="margin-top:25px;" onclick="showCakeStep(6)">Wish Made</button>`; break;
                case 6: content = `<h3 class="game-text">The candle went out!</h3><div class="cake-wrapper"><div style="opacity:1;font-size:5rem;position:absolute;bottom:180px;">⋆˚✰ 𓃗 ݁˖⭑.ᐟ</div><img src="images/${chosenFlavor==='choc'?'chocake-candle.png':'honcake-candle.png'}" width="280" style="filter:grayscale(40%);"></div><h2 style="font-size:4rem;margin:5px 0 0 0;">Happy Birthday, Rory!</h2><p class="game-text" style="margin-top:10px;">Go horse! May all your wishes come true!</p>`; break;
            }
            body.innerHTML = content;
        }
    </script>
</body>
</html>
